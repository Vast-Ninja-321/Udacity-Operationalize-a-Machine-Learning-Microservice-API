# Python CircleCI configuration file
# Based on CircleCI 2.0 syntax
# https://circleci.com/docs/language-python/

version: 2.1

jobs:
  build:
    docker:
      # Use the same Docker base as the project
      - image: python:3.7.3-stretch

    working_directory: ~/repo

    steps:
      - checkout

      # Restore cached dependencies if available
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "requirements.txt" }}
            # fallback to most recent cache
            - v1-dependencies-

      # Install dependencies and tools
      - run:
          name: Install dependencies
          command: |
            python3 -m venv venv
            . venv/bin/activate
            make install

            # Install hadolint
            wget -O /bin/hadolint https://github.com/hadolint/hadolint/releases/download/v1.16.3/hadolint-Linux-x86_64
            chmod +x /bin/hadolint

      # Save the virtual environment cache
      - save_cache:
          paths:
            - ./venv
          key: v1-dependencies-{{ checksum "requirements.txt" }}

      # Run linting
      - run:
          name: Run lint
          command: |
            . venv/bin/activate
            make lint

workflows:
  version: 2
  build_and_test:
    jobs:
      - build

